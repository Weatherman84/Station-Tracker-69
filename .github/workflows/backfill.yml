name: Backfill history

on:
  workflow_dispatch: {}   # manual trigger only — run this once from the Actions tab

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 90        # per station, not per whole run — much safer now
    strategy:
      max-parallel: 1           # one station at a time, so each commits before the next starts
      fail-fast: false          # a slow/failed station shouldn't cancel the others
      matrix:
        station: [warsaw, madrid, amsterdam, ankara]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Backfill ${{ matrix.station }}
        env:
          STATION_ID: ${{ matrix.station }}
        run: python backfill_history.py

      - name: Commit backfilled data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet --cached || git commit -m "Backfill ${{ matrix.station }} historical forecast data"
          git pull --rebase
          git push

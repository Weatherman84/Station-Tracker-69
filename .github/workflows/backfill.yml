name: Backfill history

on:
  workflow_dispatch: {}   # manual trigger only — run this once from the Actions tab

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 90        # per station, not per whole run — much safer now
    strategy:
      max-parallel: 1           # one station at a time, so each commits before the next starts
      fail-fast: false          # a slow/failed station shouldn't cancel the others
      matrix:
        station: [warsaw, madrid, amsterdam, ankara]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Backfill ${{ matrix.station }}
        env:
          STATION_ID: ${{ matrix.station }}
        run: python backfill_history.py

      - name: Commit backfilled data (merge-safe)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp data.json /tmp/local_computed.json

          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git show origin/main:data.json > /tmp/remote_current.json 2>/dev/null || echo "{}" > /tmp/remote_current.json
            python merge_data.py /tmp/local_computed.json /tmp/remote_current.json /tmp/merged_output.json
            git reset --hard origin/main
            cp /tmp/merged_output.json data.json
            git add data.json
            if git diff --quiet --cached; then
              echo "no changes to commit"
              break
            fi
            git commit -m "Backfill ${{ matrix.station }} historical forecast data"
            if git push; then
              echo "pushed successfully"
              break
            fi
            echo "push rejected (concurrent update) — retrying merge, attempt $attempt"
            sleep $((RANDOM % 10 + 3))
          done

name: Backfill history

on:
  workflow_dispatch: {}   # manual trigger only — run this once from the Actions tab

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # this pulls ~2.5 years of hourly data across many models — give it room
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run backfill
        run: python backfill_history.py

      - name: Commit backfilled data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet --cached || git commit -m "Backfill historical forecast data"
          git push

name: Update METAR

on:
  schedule:
    # every 30 minutes — METARs are typically issued hourly, this catches them promptly
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  metar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch METAR
        run: python metar_fetch.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --quiet --cached || git commit -m "Update METAR $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

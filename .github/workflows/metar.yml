name: Update METAR

on:
  schedule:
    # every 30 minutes — METARs are typically issued hourly, this catches them promptly
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  metar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch METAR
        run: python metar_fetch.py

      - name: Commit updated data (merge-safe)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp data.json /tmp/local_computed.json

          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git show origin/main:data.json > /tmp/remote_current.json 2>/dev/null || echo "{}" > /tmp/remote_current.json
            python merge_data.py /tmp/local_computed.json /tmp/remote_current.json /tmp/merged_output.json
            git reset --hard origin/main
            cp /tmp/merged_output.json data.json
            git add data.json
            if git diff --quiet --cached; then
              echo "no changes to commit"
              break
            fi
            git commit -m "Update METAR $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            if git push; then
              echo "pushed successfully"
              break
            fi
            echo "push rejected (concurrent update) — retrying merge, attempt $attempt"
            sleep $((RANDOM % 10 + 3))
          done

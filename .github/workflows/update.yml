name: Update forecast data

on:
  schedule:
    # 06:00 and 15:00 UTC daily — two runs/day builds real intraday history.
    # Adjust to taste; GitHub's cron can run a few minutes late, that's fine here.
    - cron: '0 6,15 * * *'
  workflow_dispatch: {}   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch forecasts
        env:
          METEOBLUE_API_KEY: ${{ secrets.METEOBLUE_API_KEY }}
        run: python fetch_data.py

      - name: Commit updated data (merge-safe)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp data.json /tmp/local_computed.json

          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git show origin/main:data.json > /tmp/remote_current.json 2>/dev/null || echo "{}" > /tmp/remote_current.json
            python merge_data.py /tmp/local_computed.json /tmp/remote_current.json /tmp/merged_output.json
            git reset --hard origin/main
            cp /tmp/merged_output.json data.json
            git add data.json
            if git diff --quiet --cached; then
              echo "no changes to commit"
              break
            fi
            git commit -m "Update forecast data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            if git push; then
              echo "pushed successfully"
              break
            fi
            echo "push rejected (concurrent update) — retrying merge, attempt $attempt"
            sleep $((RANDOM % 10 + 3))
          done
